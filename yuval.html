<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yuval Amar</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;500;600&display=swap"
    rel="stylesheet">
</head>

<body>
  <main class="card-container">
    <article class="card">
      <header class="card-header">
        <div class="logo-plate">
          <img src="ZITEC.png" alt="Zitec" class="logo">
        </div>
      </header>

      <div class="card-identity">
        <h1 class="name">Yuval Amar</h1>
        <p class="title">CEO</p>
        <span class="title-rule" aria-hidden="true"></span>
      </div>

      <ul class="card-details">
        <li class="detail">
          <span class="detail-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </span>
          <a href="tel:+972528648200">+972 52-864-8200</a>
        </li>
        <li class="detail">
          <span class="detail-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-10 6L2 7"/>
            </svg>
          </span>
          <a href="mailto:yuval@zitec.co.il">yuval@zitec.co.il</a>
        </li>
      </ul>

      <section class="card-actions">
        <a href="tel:+972532738409" class="action-btn action-call" aria-label="Call">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </span>
          <span class="label">Call</span>
        </a>
        <a href="mailto:yuval@zitec.co.il" class="action-btn action-email" aria-label="Send email">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-10 6L2 7"/>
            </svg>
          </span>
          <span class="label">Email</span>
        </a>
        <a href="https://wa.me/972532738409" class="action-btn action-whatsapp" target="_blank" rel="noopener noreferrer"
          aria-label="WhatsApp">
          <span class="icon icon-whatsapp" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
          </span>
          <span class="label">WhatsApp</span>
        </a>
        <a href="#" class="action-btn action-contact" id="add-contact" aria-label="Add to contacts">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M19 8v6M22 11h-6"/>
            </svg>
          </span>
          <span class="label">Save Contact</span>
        </a>
      </section>

      <footer class="card-footer">
        <a href="https://zitec.co.il" target="_blank" rel="noopener noreferrer" class="footer-link">zitec.co.il</a>
      </footer>
    </article>
  </main>

  <script>
    (function () {
      var phone = '+972528648200';
      var name = 'Yuval Amar';
      var email = 'yuval@zitec.co.il';
      var company = 'Zitec';

      function buildVCard() {
        return [
          'BEGIN:VCARD',
          'VERSION:3.0',
          'FN:' + name,
          'N:;' + name + ';;;',
          'TEL;TYPE=CELL:' + phone.replace(/\D/g, ''),
          'EMAIL:' + email,
          'ORG:' + company,
          'END:VCARD'
        ].join('\r\n');
      }

      document.getElementById('add-contact').addEventListener('click', function (e) {
        e.preventDefault();
        var vcard = buildVCard();
        var blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = name.replace(/\s+/g, '-') + '.vcf';
        a.click();
        URL.revokeObjectURL(url);
      });
    })();
  </script>
</body>

</html>
