<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אושרית עמר</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;500;600&display=swap"
    rel="stylesheet">
</head>

<body>
  <main class="card-container">
    <article class="card">
      <header class="card-header">
        <div class="avatar" aria-hidden="true"><img src="ZITEC.png" alt=""></div>
        <h1 class="name">אושרית עמר</h1>
        <p class="title">סמנכ״לית</p>
        <p class="tagline">ומנהלת בקרת איכות</p>
      </header>

      <section class="card-actions">
        <a href="tel:+972528474771" class="action-btn action-call" aria-label="התקשר">
          <span class="icon" aria-hidden="true">📞</span>
          <span class="label">התקשר</span>
        </a>
        <a href="mailto:oshrit@zitec.co.il" class="action-btn action-email" aria-label="שלח אימייל">
          <span class="icon" aria-hidden="true">✉️</span>
          <span class="label">אימייל</span>
        </a>
        <a href="#" class="action-btn action-contact" id="add-contact" aria-label="הוסף לרשימת אנשי קשר">
          <span class="icon" aria-hidden="true">👤</span>
          <span class="label">הוסף לאנשי קשר</span>
        </a>
        <a href="https://wa.me/972528474771" class="action-btn action-whatsapp" target="_blank" rel="noopener noreferrer"
          aria-label="וואטסאפ">
          <span class="icon icon-whatsapp" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="22" height="22" aria-hidden="true">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
          </span>
          <span class="label">וואטסאפ</span>
        </a>
      </section>

    </article>
  </main>

  <script>
    (function () {
      var phone = '+972528474771';
      var name = 'אושרית עמר';
      var email = 'oshrit@zitec.co.il';
      var company = 'Zitec';

      function buildVCard() {
        return [
          'BEGIN:VCARD',
          'VERSION:3.0',
          'FN:' + name,
          'N:;' + name + ';;;',
          'TEL;TYPE=CELL:' + phone.replace(/\D/g, ''),
          'EMAIL:' + email,
          'ORG:' + company,
          'END:VCARD'
        ].join('\r\n');
      }

      document.getElementById('add-contact').addEventListener('click', function (e) {
        e.preventDefault();
        var vcard = buildVCard();
        var blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = name.replace(/\s+/g, '-') + '.vcf';
        a.click();
        URL.revokeObjectURL(url);
      });
    })();
  </script>
</body>

</html>
